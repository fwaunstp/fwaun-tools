name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04 because pyke's prebuilt onnxruntime requires
        # glibc >= 2.38 (__isoc23_strtol et al). See release.yml.
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: install linux deps (egui needs X11/Wayland dev headers)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            pkg-config \
            build-essential \
            libssl-dev

      # Light build (default features): no ort, portable. This is what
      # `cargo check --workspace` exercises.
      - run: cargo check --workspace --all-targets

      # Full build (--features full): local ONNX tagger + captioner. Checked
      # explicitly so the ort-gated code paths don't bit-rot.
      - run: cargo check -p fwaun-tools-cli --all-targets --features full
      - run: cargo check -p fwaun-tools-gui --all-targets --features full

      - run: cargo test -p fwaun-tools-core
