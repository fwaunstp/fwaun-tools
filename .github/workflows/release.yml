name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist; use vX.Y.Z)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build / ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: macos-arm64
            runner: macos-14
            os: macos
            archive_ext: tar.gz
          - name: linux-x64
            # ubuntu-24.04 (glibc 2.39) is required because pyke's
            # prebuilt onnxruntime references __isoc23_strtol et al,
            # which only exist in glibc >= 2.38.
            runner: ubuntu-24.04
            os: linux
            archive_ext: tar.gz
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            archive_ext: tar.gz
          - name: windows-x64
            runner: windows-2022
            os: windows
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target.name }}

      - name: install linux deps (egui needs X11/Wayland dev headers)
        if: matrix.target.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            pkg-config \
            build-essential \
            libssl-dev \
            zip

      - name: build CLI + GUI
        run: |
          cargo build --release -p fwaun-tagger-cli
          cargo build --release -p fwaun-tagger-gui

      - name: stage artifacts
        shell: bash
        env:
          TARGET_NAME: ${{ matrix.target.name }}
          OS: ${{ matrix.target.os }}
          ARCHIVE_EXT: ${{ matrix.target.archive_ext }}
        run: |
          set -euxo pipefail
          mkdir -p staging
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi

          # Per-platform binary suffix
          if [ "$OS" = "windows" ]; then
            CLI_BIN="target/release/fwaun-tagger.exe"
            GUI_BIN="target/release/fwaun-tagger-gui.exe"
          else
            CLI_BIN="target/release/fwaun-tagger"
            GUI_BIN="target/release/fwaun-tagger-gui"
          fi

          # CLI archive (always single-binary).
          CLI_NAME="fwaun-tagger-cli-${VERSION}-${TARGET_NAME}"
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            ( cd "$(dirname "$CLI_BIN")" && 7z a "${GITHUB_WORKSPACE}/staging/${CLI_NAME}.zip" "$(basename "$CLI_BIN")" )
          else
            tar czf "staging/${CLI_NAME}.tar.gz" -C "$(dirname "$CLI_BIN")" "$(basename "$CLI_BIN")"
          fi

          # GUI artifact (same shape on every OS — a single archive
          # holding both binaries plus the LICENSE files).
          PKG_DIR="dist/fwaun-tagger-${VERSION}-${TARGET_NAME}"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR"
          cp "$GUI_BIN" "$PKG_DIR/$(basename "$GUI_BIN")"
          cp "$CLI_BIN" "$PKG_DIR/$(basename "$CLI_BIN")"
          cp LICENSE-MIT LICENSE-APACHE "$PKG_DIR/"
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            ( cd dist && 7z a "${GITHUB_WORKSPACE}/staging/fwaun-tagger-${VERSION}-${TARGET_NAME}.zip" "$(basename "$PKG_DIR")" )
          else
            ( cd dist && tar czf "${GITHUB_WORKSPACE}/staging/fwaun-tagger-${VERSION}-${TARGET_NAME}.tar.gz" "$(basename "$PKG_DIR")" )
          fi

          ls -la staging

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: staging/*
          if-no-files-found: error

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: list artifacts
        run: ls -la staging

      - name: compute checksums
        working-directory: staging
        run: sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: staging/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
