[package]
name = "anima-tagger-gui"
description = "Desktop GUI for anima-tagger: curate Stable Diffusion LoRA datasets with an integrated tag/caption editor."
categories = ["gui"]
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true

[[bin]]
name = "anima-tagger-gui"
path = "src/main.rs"

[dependencies]
anima-tagger-core = { workspace = true }
anima-tagger-tagger = { workspace = true }
anima-tagger-captioner = { workspace = true }
anima-tagger-booru = { workspace = true }
dioxus = { version = "0.7", features = ["desktop"] }
serde = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
rfd = "0.15"
image = { workspace = true }
base64 = "0.22"
toml = { workspace = true }
sys-locale = "0.3"
